name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package artifact
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp .pio/build/esp32/firmware.bin "dist/esp32now-${VERSION}.bin"
          cp .pio/build/esp32/firmware.elf "dist/esp32now-${VERSION}.elf"
          cp .pio/build/esp32/bootloader.bin "dist/bootloader-${VERSION}.bin"
          cp .pio/build/esp32/partitions.bin "dist/partitions-${VERSION}.bin"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32now-${{ steps.version.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
